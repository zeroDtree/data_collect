services:
  traefik:
    image: traefik:v3.7
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?Set ACME_EMAIL in .env}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_acme:/acme
    networks:
      - traefik_net
    security_opt:
      - no-new-privileges:true

  data-collect:
    networks:
      - traefik_net
    labels:
      - traefik.enable=true
      - traefik.docker.network=data_collect_traefik
      - traefik.http.routers.data-collect.rule=Host(`${PUBLIC_HOST:?Set PUBLIC_HOST}`)
      - traefik.http.routers.data-collect.entrypoints=websecure
      - traefik.http.routers.data-collect.tls=true
      - traefik.http.routers.data-collect.tls.certresolver=letsencrypt
      - traefik.http.services.data-collect.loadbalancer.server.port=8787

networks:
  traefik_net:
    name: data_collect_traefik

volumes:
  traefik_acme:
